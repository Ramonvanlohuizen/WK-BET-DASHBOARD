<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WK 2026">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<title>WK 2026 · Trein</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --or:#E85D04;--or2:#FF6B1A;--or3:rgba(232,93,4,0.10);--or4:rgba(232,93,4,0.06);
  --bk:#111111;--wh:#ffffff;--wh2:#f5f5f5;
  --g1:#333333;--g2:#666666;--g3:#999999;--g4:#cccccc;--g5:#e8e8e8;--g6:#f2f2f2;
  --gr:#16a34a;--gr2:rgba(22,163,74,0.10);--gr3:rgba(22,163,74,0.30);
  --re:#dc2626;--re2:rgba(220,38,38,0.10);--re3:rgba(220,38,38,0.30);
  --r:4px;--rm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--wh2);color:var(--bk);font-family:'Barlow',sans-serif;font-size:15px;min-height:100vh;padding-bottom:calc(60px + env(safe-area-inset-bottom))}
header{background:var(--wh);border-bottom:3px solid var(--or);padding:0 18px;padding-top:env(safe-area-inset-top);position:sticky;top:0;z-index:10;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.hinner{display:flex;justify-content:space-between;align-items:center;height:50px}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:23px;font-weight:900;letter-spacing:.04em;text-transform:uppercase;color:var(--bk)}
.logo span{color:var(--or)}
.nav-tabs{display:flex;border-top:1px solid var(--g5)}
.nav-tab{flex:1;text-align:center;padding:10px 0;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;text-decoration:none;color:var(--g3);border-bottom:3px solid transparent;transition:all .15s}
.nav-tab.active{color:var(--or);border-bottom-color:var(--or)}
main{padding:0;max-width:480px;margin:0 auto}
.sec-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--or);padding:16px 18px 8px;display:flex;align-items:center;gap:7px}
.sec-label:before{content:'';display:block;width:3px;height:13px;background:var(--or);border-radius:2px;flex-shrink:0}
.card{background:var(--wh);padding:14px 18px;margin-bottom:2px}

/* ── Setup card ── */
.setup-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.setup-field label{display:block;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--g3);margin-bottom:5px}
.setup-field input{width:100%;background:var(--wh);border:1.5px solid var(--g5);border-radius:var(--r);color:var(--bk);font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;padding:10px 12px;outline:none;text-align:center;transition:border-color .15s}
.setup-field input:focus{border-color:var(--or)}
.btn-start{width:100%;background:var(--or);border:none;border-radius:var(--r);color:var(--wh);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;letter-spacing:.06em;padding:14px;text-transform:uppercase;transition:opacity .15s}
.btn-start:active{opacity:.85}

/* ── Stats strip ── */
.stats-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-bottom:2px}
.stat-tile{background:var(--wh);padding:12px 14px}
.stat-lbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--g3);margin-bottom:3px}
.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;color:var(--bk)}
.stat-val.or{color:var(--or)}.stat-val.pos{color:var(--gr)}.stat-val.neg{color:var(--re)}

/* ── Train visualization ── */
.train-section{background:var(--wh);padding:18px;margin-bottom:2px;overflow:hidden}
.train-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--g3);margin-bottom:16px;display:flex;align-items:center;gap:7px}
.train-title:before{content:'';display:block;width:3px;height:12px;background:var(--or);border-radius:2px;flex-shrink:0}

/* Track */
.track-container{position:relative;width:100%;overflow-x:auto;padding-bottom:8px}
.track-inner{position:relative;min-width:100%}
.track-line{position:relative;display:flex;align-items:center;padding:0 0 0 0}
.track-rail{position:absolute;top:50%;left:0;right:0;height:4px;background:var(--g5);border-radius:2px;transform:translateY(-50%);z-index:0}
.track-rail-done{position:absolute;top:50%;left:0;height:4px;background:var(--or);border-radius:2px;transform:translateY(-50%);z-index:1;transition:width .5s ease}
.stations-row{display:flex;justify-content:space-between;align-items:center;position:relative;z-index:2;width:100%}

/* Station */
.station{display:flex;flex-direction:column;align-items:center;flex:0 0 auto}
.station-dot{width:28px;height:28px;border-radius:50%;border:3px solid var(--g5);background:var(--wh);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;color:var(--g4);transition:all .3s;position:relative;z-index:3}
.station-dot.done{background:var(--gr);border-color:var(--gr);color:var(--wh)}
.station-dot.active{background:var(--or);border-color:var(--or);color:var(--wh);box-shadow:0 0 0 4px var(--or3)}
.station-dot.failed{background:var(--re);border-color:var(--re);color:var(--wh)}
.station-dot.end{background:var(--bk);border-color:var(--bk);color:var(--wh);width:34px;height:34px;font-size:16px}
.station-dot.end.done{background:var(--gr);border-color:var(--gr)}
.station-label{font-size:9px;font-weight:700;color:var(--g3);margin-top:5px;letter-spacing:.04em;text-align:center;white-space:nowrap;max-width:40px;overflow:hidden;text-overflow:ellipsis}
.station-amount{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--g3);margin-top:1px}
.station-amount.won{color:var(--gr)}.station-amount.lost{color:var(--re)}.station-amount.cur{color:var(--or)}

/* Train emoji */
.train-emoji{position:absolute;top:50%;font-size:24px;transform:translate(-50%,-70%);transition:left .5s ease;z-index:10;filter:drop-shadow(0 2px 4px rgba(0,0,0,.2))}

/* ── Bet card ── */
.inzet-bar{background:var(--or);padding:13px 18px;display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.inzet-lbl{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,0.75)}
.inzet-amt{font-family:'Barlow Condensed',sans-serif;font-size:34px;font-weight:900;color:var(--wh)}
.action-row{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-bottom:2px}
.btn-win{background:var(--gr);border:none;color:var(--wh);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;letter-spacing:.06em;padding:15px;text-transform:uppercase;transition:opacity .15s}
.btn-win:active{opacity:.85}
.btn-loss{background:var(--re);border:none;color:var(--wh);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;letter-spacing:.06em;padding:15px;text-transform:uppercase;transition:opacity .15s}
.btn-loss:active{opacity:.85}
.tip-bar{background:var(--wh);border-left:3px solid var(--or);padding:11px 14px;font-size:13px;color:var(--g2);margin-bottom:2px}
.tip-bar strong{color:var(--or)}

/* ── History ── */
.hi-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--g6)}
.hi-row:last-child{border-bottom:none}
.hi-left{flex:1;min-width:0}
.hi-match{font-size:13px;font-weight:600;color:var(--bk);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hi-meta{font-size:11px;color:var(--g3);margin-top:2px}
.hi-right{display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:8px}
.badge{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;padding:3px 9px;border-radius:2px}
.bwin{background:var(--gr2);color:var(--gr);border:1px solid var(--gr3)}
.blos{background:var(--re2);color:var(--re);border:1px solid var(--re3)}
.empty{font-size:13px;color:var(--g3);text-align:center;padding:16px 0}

/* ── Result overlay ── */
.result-overlay{background:var(--wh);padding:30px 18px;text-align:center;margin-bottom:2px}
.result-icon{font-size:56px;margin-bottom:12px}
.result-title{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:900;letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}
.result-title.won{color:var(--gr)}.result-title.lost{color:var(--re)}
.result-sub{font-size:14px;color:var(--g2);margin-bottom:20px;line-height:1.6}
.result-amount{font-family:'Barlow Condensed',sans-serif;font-size:52px;font-weight:900;margin-bottom:20px}
.result-amount.won{color:var(--gr)}.result-amount.lost{color:var(--re)}
.btn-new{background:var(--or);border:none;border-radius:var(--r);color:var(--wh);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;letter-spacing:.06em;padding:14px 28px;text-transform:uppercase;transition:opacity .15s}
.btn-new:active{opacity:.85}

/* ── Toast ── */
.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:200;pointer-events:none}
.toast{background:var(--bk);color:var(--wh);font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:.04em;padding:10px 22px;text-transform:uppercase;white-space:nowrap;opacity:0;transform:translateY(8px);transition:opacity .25s,transform .25s;border-radius:var(--r);border-top:2px solid var(--or)}
.toast.show{opacity:1;transform:translateY(0)}
.toast.win{border-top-color:var(--gr)}.toast.loss{border-top-color:var(--re)}

/* ── Train animation overlay ── */
.train-anim-overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:100;pointer-events:none;overflow:hidden;display:none}
.train-anim-overlay.active{display:block}
.train-anim-overlay.dark{background:rgba(0,0,0,0.75);transition:background .3s}
.anim-sky{position:absolute;inset:0;background:linear-gradient(180deg,#1a3a5c 0%,#2d6aa0 50%,#4a9fd4 100%);opacity:0;transition:opacity .4s}
.anim-sky.show{opacity:1}
/* Ground */
.anim-ground{position:absolute;bottom:0;left:0;right:0;height:35%;background:#2d5016;opacity:0;transition:opacity .4s}
.anim-ground.show{opacity:1}
/* Rails */
.anim-rails{position:absolute;bottom:28%;left:0;right:0;height:14px;opacity:0;transition:opacity .4s}
.anim-rails.show{opacity:1}
.rail-top,.rail-bot{position:absolute;left:0;right:0;height:4px;background:#888;border-radius:2px}
.rail-top{top:0}.rail-bot{bottom:0}
.sleepers{position:absolute;inset:0;display:flex;gap:0}
.sleeper{width:18px;height:100%;background:#5a3a1a;border-radius:1px;flex-shrink:0}
/* Moving background elements */
.bg-scroll{position:absolute;bottom:28%;width:200%;height:60%;display:flex;gap:0}
.bg-tree{position:absolute;bottom:100%;font-size:32px;animation:none}
.bg-pole{position:absolute;bottom:0;width:4px;background:#555;border-radius:2px}
.bg-pole:before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:20px;height:3px;background:#555;border-radius:2px}
/* Train SVG */
.anim-train{position:absolute;bottom:calc(28% + 10px);left:50%;transform:translateX(-50%);opacity:0;transition:opacity .5s}
.anim-train.show{opacity:1}
.anim-train svg{filter:drop-shadow(0 4px 12px rgba(0,0,0,0.4))}
/* Wheels spin */
@keyframes spin{from{transform-origin:center;transform:rotate(0deg)}to{transform-origin:center;transform:rotate(360deg)}}
.wheel-anim{animation:spin .4s linear infinite}
/* Train shake while moving */
@keyframes trainShake{0%,100%{transform:translateX(-50%) translateY(0)}25%{transform:translateX(-50%) translateY(-2px)}75%{transform:translateX(-50%) translateY(1px)}}
.anim-train.moving{animation:trainShake .15s ease-in-out infinite}
/* Steam puffs */
.steam{position:absolute;border-radius:50%;background:rgba(255,255,255,0.8);animation:steamUp 1s ease-out forwards}
@keyframes steamUp{0%{opacity:.8;transform:scale(1) translateY(0)}100%{opacity:0;transform:scale(3) translateY(-60px)}}
/* Scenery scroll */
@keyframes scrollLeft{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.scroll-layer{animation:scrollLeft linear infinite}
/* Win particles */
.particle{position:absolute;border-radius:50%;animation:particleFly 1.2s ease-out forwards}
@keyframes particleFly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)}}
/* Text overlay */
.anim-text{position:absolute;top:15%;left:50%;transform:translateX(-50%);text-align:center;opacity:0;transition:opacity .5s;white-space:nowrap}
.anim-text.show{opacity:1}
.anim-title{font-family:'Barlow Condensed',sans-serif;font-size:38px;font-weight:900;letter-spacing:.04em;text-transform:uppercase;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.5)}
.anim-title span{color:#f97316}
.anim-subtitle{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:rgba(255,255,255,.85);margin-top:4px}
/* Stars */
.star{position:absolute;color:#ffd700;animation:starTwinkle 1.5s ease-in-out infinite}
@keyframes starTwinkle{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
</style>
</head>
<body>

<header>
  <div class="hinner">
    <div class="logo">WK <span>2026</span></div>
    <div></div>
  </div>
  <div class="nav-tabs">
    <a href="index.html" class="nav-tab">1·3·2·6</a>
    <a href="trein.html" class="nav-tab active">Trein 🚂</a>
  </div>
</header>

<main id="main">

  <!-- SETUP -->
  <div id="view-setup">
    <div class="sec-label">Nieuwe treinrit instellen</div>
    <div class="card">
      <div class="setup-grid">
        <div class="setup-field">
          <label>Startbudget (€)</label>
          <input type="number" id="cfg-budget" value="30" min="1" step="1">
        </div>
        <div class="setup-field">
          <label>Aantal haltes</label>
          <input type="number" id="cfg-haltes" value="10" min="2" max="20" step="1">
        </div>
      </div>
      <button class="btn-start" onclick="startTrain()">🚂 Trein vertrekken</button>
    </div>

    <!-- Saved journeys -->
    <div id="saved-section" style="display:none">
      <div class="sec-label">Eerdere ritten</div>
      <div class="card" id="saved-list"></div>
    </div>
  </div>

  <!-- ACTIVE JOURNEY -->
  <div id="view-active" style="display:none">

    <div class="stats-strip">
      <div class="stat-tile"><div class="stat-lbl">Inzet</div><div class="stat-val or" id="s-inzet">€30</div></div>
      <div class="stat-tile"><div class="stat-lbl">Halte</div><div class="stat-val" id="s-halte">1 / 10</div></div>
      <div class="stat-tile"><div class="stat-lbl">Potentieel</div><div class="stat-val pos" id="s-pot">—</div></div>
    </div>

    <!-- Train track -->
    <div class="train-section">
      <div class="train-title">Route</div>
      <div class="track-container">
        <div class="track-inner" id="track-inner">
          <div class="track-line">
            <div class="track-rail"></div>
            <div class="track-rail-done" id="rail-done" style="width:0%"></div>
            <div class="stations-row" id="stations-row"></div>
          </div>
          <div class="train-emoji" id="train-emoji" style="left:0%">🚂</div>
        </div>
      </div>
    </div>

    <!-- Current bet -->
    <div class="inzet-bar">
      <div class="inzet-lbl">Inzet halte <span id="cur-halte-num">1</span></div>
      <div class="inzet-amt" id="betdisp">€30</div>
    </div>

    <div class="action-row">
      <button class="btn-win" onclick="recordResult(true)">✓ Gewonnen</button>
      <button class="btn-loss" onclick="recordResult(false)">✕ Verloren</button>
    </div>

    <div class="tip-bar" id="tipbar"></div>

    <!-- History -->
    <div class="sec-label">Haltes afgelegd · <span id="hcount">0</span></div>
    <div class="card">
      <div id="hlist"><div class="empty">Nog geen haltes afgelegd</div></div>
    </div>

    <div style="text-align:center;padding:28px 18px 8px">
      <button onclick="abandonJourney()" style="background:none;border:none;color:var(--g4);font-family:'Barlow',sans-serif;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;text-decoration:underline;text-underline-offset:3px;padding:8px 16px">Rit afbreken</button>
    </div>
  </div>

  <!-- RESULT -->
  <div id="view-result" style="display:none">
    <div class="result-overlay">
      <div class="result-icon" id="res-icon">🎉</div>
      <div class="result-title" id="res-title">Eindstation!</div>
      <div class="result-amount" id="res-amount">+€270</div>
      <div class="result-sub" id="res-sub">Je hebt alle 10 haltes succesvol afgelegd.</div>
      <button class="btn-new" onclick="newJourney()">🚂 Nieuwe rit</button>
    </div>

    <div class="sec-label">Rit overzicht</div>
    <div class="card" id="result-history"></div>
  </div>

</main>


<!-- Train animation overlay -->
<div class="train-anim-overlay" id="train-overlay">
  <div class="anim-sky" id="anim-sky"></div>
  <div id="anim-stars"></div>
  <div class="bg-scroll scroll-layer" id="bg-scroll" style="animation-duration:3s"></div>
  <div class="anim-ground" id="anim-ground"></div>
  <div class="anim-rails" id="anim-rails">
    <div class="rail-top"></div>
    <div class="rail-bot"></div>
    <div class="sleepers" id="sleepers"></div>
  </div>
  <div class="anim-train" id="anim-train">
    <svg width="280" height="90" viewBox="0 0 280 90" xmlns="http://www.w3.org/2000/svg">

      <rect x="20" y="18" width="220" height="52" rx="8" fill="#E85D04"/>

      <rect x="155" y="26" width="28" height="20" rx="3" fill="#dbeafe" opacity=".9"/>
      <rect x="195" y="26" width="28" height="20" rx="3" fill="#dbeafe" opacity=".9"/>
      <!-- Stripe -->
      <rect x="20" y="52" width="220" height="6" rx="0" fill="#cc5000"/>

      <rect x="25" y="68" width="210" height="8" rx="3" fill="#333"/>
      <!-- Wheels -->
      <circle cx="55" cy="78" r="12" fill="#222" class="wheel-anim" id="w1"/>
      <circle cx="55" cy="78" r="5" fill="#888"/>
      <circle cx="110" cy="78" r="12" fill="#222" class="wheel-anim" id="w2"/>
      <circle cx="110" cy="78" r="5" fill="#888"/>
      <circle cx="165" cy="78" r="12" fill="#222" class="wheel-anim" id="w3"/>
      <circle cx="165" cy="78" r="5" fill="#888"/>
      <circle cx="220" cy="78" r="12" fill="#222" class="wheel-anim" id="w4"/>
      <circle cx="220" cy="78" r="5" fill="#888"/>
      <!-- Front light -->
      <circle cx="264" cy="38" r="6" fill="#ffd700" opacity=".9"/>
      <circle cx="264" cy="52" r="4" fill="#ff4444" opacity=".8"/>
      <!-- KNVB logo area -->
      <rect x="88" y="30" width="44" height="12" rx="2" fill="#fff" opacity=".2"/>
      <text x="110" y="41" font-family="Arial Black" font-size="9" fill="#fff" text-anchor="middle" font-weight="900">WK 2026</text>
    </svg>
    <!-- Steam -->
    <div id="steam-container" style="position:absolute;top:-10px;left:20px;width:40px;height:40px"></div>
  </div>
  <div class="anim-text" id="anim-text">
    <div class="anim-title" id="anim-title">Halte <span id="anim-halte-num">1</span> ✓</div>
    <div class="anim-subtitle" id="anim-subtitle">+€27.00 winst!</div>
  </div>
  <div id="particles-container"></div>
</div>
<div class="toast-wrap"><div class="toast" id="toast"></div></div>

<script>
const SB_URL="https://qulpykjmpeqezumaewva.supabase.co";

const LS_JOURNEY = 'wk2026_trein_v1';

function getState(){return JSON.parse(localStorage.getItem(LS_JOURNEY)||'null');}
function saveState(){localStorage.setItem(LS_JOURNEY,JSON.stringify(J));}
function getSaved(){return JSON.parse(localStorage.getItem(LS_SAVED)||'[]');}
function saveSaved(arr){localStorage.setItem(LS_SAVED,JSON.stringify(arr));}

function init(){
  const saved = getSaved();
  const active = getState();
  if(active && !active.finished){
    J = active;
    showView('active');
    renderTrack();
    renderStats();
    renderHistory();
    renderTip();
  } else {
    showView('setup');
    renderSaved();
  }
}

function showView(v){
  ['setup','active','result'].forEach(x=>document.getElementById('view-'+x).style.display=x===v?'block':'none');
}

function startTrain(){
  const budget = parseFloat(document.getElementById('cfg-budget').value);
  const haltes = parseInt(document.getElementById('cfg-haltes').value);
  if(!budget||budget<1){toast('Vul geldig budget in','loss');return;}
  if(!haltes||haltes<2||haltes>20){toast('2 tot 20 haltes','loss');return;}

  J = {
    id: Date.now(),
    budget,
    haltes,
    current: 0,
    inzet: budget,
    stops: [],
    finished: false,
    startedAt: new Date().toLocaleString('nl-NL',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})
  };
  saveState();
  showView('active');
  renderTrack();
  renderStats();
  renderHistory();
  renderTip();
  toast('Trein vertrekt!','');
}

function recordResult(won){
  const halteNum = J.current + 1;
  const inzet = J.inzet;
  const oddsStr = prompt(`Halte ${halteNum}: vul de odds in (bijv. 2.00)`);
  const odds = parseFloat(oddsStr);
  if(isNaN(odds)||odds<1.01){toast('Ongeldige odds','loss');return;}

  const winst = won ? parseFloat((inzet*(odds-1)).toFixed(2)) : 0;
  const stop = {halte:halteNum, inzet, odds, won, winst, ts:new Date().toLocaleString('nl-NL',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})};
  J.stops.push(stop);
  J.current++;

  if(!won){
    playDerailAnimation(halteNum, ()=>{
      J.finished = true; J.result = 'lost'; J.finalProfit = -J.budget;
      saveState(); showResult();
    });
    return;
  }

  if(J.current >= J.haltes){
    const totalWinst = J.stops.reduce((a,s)=>a+s.winst,0);
    J.finished = true; J.result = 'won'; J.finalProfit = totalWinst;
    playTrainAnimation(halteNum, winst, true, ()=>{ saveState(); showResult(); });
    return;
  }

  J.inzet = parseFloat(winst.toFixed(2));
  saveState();
  playTrainAnimation(halteNum, winst, false, ()=>{
    renderTrack(); renderStats(); renderHistory(); renderTip();
  });
}

function playTrainAnimation(halteNum, winst, isFinal, callback){
  const overlay = document.getElementById('train-overlay');
  const sky = document.getElementById('anim-sky');
  const ground = document.getElementById('anim-ground');
  const rails = document.getElementById('anim-rails');
  const train = document.getElementById('anim-train');
  const text = document.getElementById('anim-text');
  const bgScroll = document.getElementById('bg-scroll');

  // Build scenery
  buildScenery();
  buildSleepers();
  buildStars();

  // Set text
  document.getElementById('anim-halte-num').textContent = halteNum;
  document.getElementById('anim-subtitle').textContent = isFinal
    ? `🏆 Eindstation bereikt! +€${winst.toFixed(2)}`
    : `+€${winst.toFixed(2)} winst — volgende halte!`;

  // Show overlay
  overlay.classList.add('active');
  requestAnimationFrame(()=>{
    sky.classList.add('show');
    ground.classList.add('show');
    rails.classList.add('show');
  });

  // Show train after short delay
  setTimeout(()=>{
    train.classList.add('show');
    train.classList.add('moving');
    bgScroll.style.animationPlayState = 'running';
    startSteam();
    spawnParticles();
  }, 300);

  // Show text
  setTimeout(()=>text.classList.add('show'), 600);

  // Stop movement, show final state
  setTimeout(()=>{
    train.classList.remove('moving');
    bgScroll.style.animationPlayState = 'paused';
  }, 2200);

  // Fade out and callback
  setTimeout(()=>{
    text.classList.remove('show');
    train.classList.remove('show');
  }, 3000);

  setTimeout(()=>{
    sky.classList.remove('show');
    ground.classList.remove('show');
    rails.classList.remove('show');
    overlay.classList.remove('active','dark');
    clearSteam();
    callback();
  }, 3500);
}

function playDerailAnimation(halteNum, callback){
  const overlay = document.getElementById('train-overlay');
  const sky = document.getElementById('anim-sky');
  const ground = document.getElementById('anim-ground');
  const rails = document.getElementById('anim-rails');
  const train = document.getElementById('anim-train');
  const text = document.getElementById('anim-text');

  buildScenery(); buildSleepers();

  document.getElementById('anim-halte-num').textContent = halteNum;
  document.getElementById('anim-subtitle').textContent = '💥 Ontspoord!';
  document.getElementById('anim-title').innerHTML = 'Halte <span id="anim-halte-num">'+halteNum+'</span> ✕';

  overlay.classList.add('active');
  overlay.style.background = 'rgba(0,0,0,0)';
  requestAnimationFrame(()=>{ sky.classList.add('show'); ground.classList.add('show'); rails.classList.add('show'); });

  setTimeout(()=>{
    train.classList.add('show','moving');
    startSteam();
  }, 300);

  // Derail: rotate and shake
  setTimeout(()=>{
    train.classList.remove('moving');
    train.querySelector('svg').style.transition = 'transform .5s ease';
    train.querySelector('svg').style.transform = 'rotate(15deg) translateY(-10px)';
    overlay.classList.add('dark');
    spawnParticles('#dc2626');
  }, 1500);

  setTimeout(()=>text.classList.add('show'), 1800);

  setTimeout(()=>{
    text.classList.remove('show');
    train.classList.remove('show');
    train.querySelector('svg').style.transform = '';
  }, 3200);

  setTimeout(()=>{
    sky.classList.remove('show'); ground.classList.remove('show'); rails.classList.remove('show');
    overlay.classList.remove('active','dark');
    overlay.style.background = '';
    clearSteam();
    callback();
  }, 3700);
}

function buildScenery(){
  const bg = document.getElementById('bg-scroll');
  bg.style.animationDuration = '2.5s';
  bg.style.animationPlayState = 'paused';
  const W = window.innerWidth;
  let html = '';
  const treeTypes = ['🌲','🌳','🌴','🏠','🏡','⛪'];
  // Build 2 full widths of scenery
  for(let i=0;i<40;i++){
    const x = (i/40)*200;
    const type = treeTypes[Math.floor(Math.random()*treeTypes.length)];
    const size = 20 + Math.random()*18;
    const bot = 14 + Math.random()*30;
    html += `<span style="position:absolute;left:${x}%;bottom:${bot}px;font-size:${size}px;opacity:${0.6+Math.random()*.4}">${type}</span>`;
  }
  // Add some mountain shapes
  html += `<svg style="position:absolute;bottom:0;left:0;width:200%;height:100px" viewBox="0 0 800 100" preserveAspectRatio="none"><path d="M0 100 L80 20 L160 60 L240 10 L320 50 L400 15 L480 55 L560 25 L640 65 L720 30 L800 60 L800 100Z" fill="rgba(255,255,255,0.08)"/></svg>`;
  bg.innerHTML = html;
}

function buildSleepers(){
  const el = document.getElementById('sleepers');
  let html = '';
  for(let i=0;i<60;i++) html += '<div class="sleeper"></div>';
  el.innerHTML = html;
}

function buildStars(){
  const el = document.getElementById('anim-stars');
  let html = '';
  for(let i=0;i<20;i++){
    const x = Math.random()*100, y = Math.random()*40;
    const delay = Math.random()*2, dur = 1+Math.random();
    html += `<span class="star" style="left:${x}%;top:${y}%;font-size:${8+Math.random()*10}px;animation-delay:${delay}s;animation-duration:${dur}s">★</span>`;
  }
  el.innerHTML = html;
}

let steamInterval = null;
function startSteam(){
  const container = document.getElementById('steam-container');
  steamInterval = setInterval(()=>{
    const puff = document.createElement('div');
    puff.className = 'steam';
    const size = 8 + Math.random()*12;
    puff.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*30}px;top:0;position:absolute`;
    container.appendChild(puff);
    setTimeout(()=>puff.remove(), 1000);
  }, 150);
}
function clearSteam(){
  clearInterval(steamInterval);
  const c = document.getElementById('steam-container');
  if(c) c.innerHTML='';
}

function spawnParticles(color){
  const container = document.getElementById('particles-container');
  const colors = color ? [color] : ['#f97316','#fbbf24','#34d399','#60a5fa','#f472b6'];
  for(let i=0;i<30;i++){
    const p = document.createElement('div');
    p.className = 'particle';
    const c = colors[Math.floor(Math.random()*colors.length)];
    const size = 6+Math.random()*10;
    const x = 20+Math.random()*60, y = 20+Math.random()*60;
    const dx = (Math.random()-0.5)*200, dy = (Math.random()-1)*200;
    const delay = Math.random()*0.5;
    p.style.cssText = `left:${x}%;top:${y}%;width:${size}px;height:${size}px;background:${c};--dx:${dx}px;--dy:${dy}px;animation-delay:${delay}s;position:absolute`;
    container.appendChild(p);
    setTimeout(()=>p.remove(), 1500);
  }
}

function showResult(){
  const won = J.result === 'won';
  const saved = getSaved();
  saved.unshift({...J});
  if(saved.length>10)saved.pop();
  saveSaved(saved);
  localStorage.removeItem(LS_JOURNEY);

  showView('result');
  document.getElementById('res-icon').textContent = won ? '🏆' : '💥';
  document.getElementById('res-title').textContent = won ? 'Eindstation!' : 'Ontspoord!';
  document.getElementById('res-title').className = 'result-title '+(won?'won':'lost');
  const profit = won ? J.finalProfit : -J.budget;
  document.getElementById('res-amount').textContent = (profit>=0?'+':'')+'€'+profit.toFixed(2);
  document.getElementById('res-amount').className = 'result-amount '+(won?'won':'lost');
  document.getElementById('res-sub').textContent = won
    ? `Je hebt alle ${J.haltes} haltes succesvol afgelegd met een startinzet van €${J.budget}.`
    : `De trein is ontspoord bij halte ${J.current} van de ${J.haltes}.`;

  // Result history
  const el = document.getElementById('result-history');
  el.innerHTML = J.stops.map(s=>`
    <div class="hi-row">
      <div class="hi-left"><div class="hi-match">Halte ${s.halte}</div><div class="hi-meta">@${s.odds} · inzet €${s.inzet.toFixed(2)} · ${s.ts}</div></div>
      <div class="hi-right"><span class="badge ${s.won?'bwin':'blos'}">${s.won?'+€'+s.winst.toFixed(2):'Verloren'}</span></div>
    </div>`).join('');
}

function newJourney(){
  J = null;
  showView('setup');
  renderSaved();
}

function abandonJourney(){
  if(!confirm('Rit afbreken?'))return;
  J = null;
  localStorage.removeItem(LS_JOURNEY);
  showView('setup');
  renderSaved();
  toast('Rit afgebroken','');
}

function renderTrack(){
  const total = J.haltes;
  const done = J.current;
  const row = document.getElementById('stations-row');
  const inner = document.getElementById('track-inner');

  // Calculate station positions as percentages
  const stationPct = i => total <= 1 ? 50 : (i/(total))*100;

  let html = '';
  for(let i=0;i<=total;i++){
    const isStart = i===0;
    const isEnd = i===total;
    const isDone = i < done;
    const isActive = i === done;
    const stop = J.stops[i-1];
    const isFailed = stop && !stop.won;

    let dotClass = 'station-dot';
    if(isEnd) dotClass += ' end';
    if(isDone && !isFailed) dotClass += ' done';
    if(isActive && !J.finished) dotClass += ' active';
    if(isFailed) dotClass += ' failed';
    if(isEnd && isDone && J.result==='won') dotClass += ' done';

    let label = isStart ? 'Start' : isEnd ? '🏁' : `H${i}`;
    let amountHtml = '';
    if(stop){
      const cls = stop.won ? 'won' : 'lost';
      amountHtml = `<div class="station-amount ${cls}">${stop.won?'+€'+stop.winst.toFixed(2):'✕'}</div>`;
    } else if(isActive && !J.finished){
      amountHtml = `<div class="station-amount cur">€${J.inzet.toFixed(2)}</div>`;
    }

    html += `<div class="station" style="position:relative;z-index:3">
      <div class="${dotClass}">${isEnd?'🏁':isStart?'🚉':i}</div>
      <div class="station-label">${label}</div>
      ${amountHtml}
    </div>`;
  }
  row.innerHTML = html;

  // Rail progress
  const pct = total > 0 ? (done/total)*100 : 0;
  document.getElementById('rail-done').style.width = pct+'%';

  // Train position
  const trainPct = total > 0 ? (done/total)*100 : 0;
  document.getElementById('train-emoji').style.left = trainPct+'%';
}

function renderStats(){
  document.getElementById('s-inzet').textContent = '€'+J.inzet.toFixed(2);
  document.getElementById('s-halte').textContent = (J.current+1)+' / '+J.haltes;
  document.getElementById('cur-halte-num').textContent = J.current+1;
  document.getElementById('betdisp').textContent = '€'+J.inzet.toFixed(2);

  // Potential if win all remaining at 2.0 odds
  let pot = J.inzet;
  const remaining = J.haltes - J.current;
  for(let i=0;i<remaining;i++) pot = pot * 2;
  document.getElementById('s-pot').textContent = '€'+pot.toFixed(0);
}

function renderTip(){
  const remaining = J.haltes - J.current;
  const tb = document.getElementById('tipbar');
  tb.innerHTML = `Halte <strong>${J.current+1}</strong> van <strong>${J.haltes}</strong> — inzet <strong>€${J.inzet.toFixed(2)}</strong>. Bij winst zet je de winst in op halte ${J.current+2}. Nog <strong>${remaining}</strong> haltes tot het eindstation.`;
}

function renderHistory(){
  document.getElementById('hcount').textContent = J.stops.length;
  const el = document.getElementById('hlist');
  if(!J.stops.length){el.innerHTML='<div class="empty">Nog geen haltes afgelegd</div>';return;}
  el.innerHTML=[...J.stops].reverse().map(s=>`
    <div class="hi-row">
      <div class="hi-left">
        <div class="hi-match">Halte ${s.halte} <span style="color:var(--g3);font-weight:400">@${s.odds}</span></div>
        <div class="hi-meta">Inzet €${s.inzet.toFixed(2)} · ${s.ts}</div>
      </div>
      <div class="hi-right">
        <span class="badge ${s.won?'bwin':'blos'}">${s.won?'+€'+s.winst.toFixed(2):'Verloren'}</span>
      </div>
    </div>`).join('');
}

function renderSaved(){
  const saved = getSaved();
  const section = document.getElementById('saved-section');
  if(!saved.length){section.style.display='none';return;}
  section.style.display='block';
  document.getElementById('saved-list').innerHTML = saved.map(j=>{
    const won = j.result==='won';
    const profit = won ? j.finalProfit : -j.budget;
    return `<div class="hi-row">
      <div class="hi-left">
        <div class="hi-match">${j.haltes} haltes · €${j.budget} start</div>
        <div class="hi-meta">${j.startedAt} · ${j.stops.length} haltes afgelegd</div>
      </div>
      <div class="hi-right">
        <span class="badge ${won?'bwin':'blos'}">${(profit>=0?'+':'')+'€'+profit.toFixed(2)}</span>
      </div>
    </div>`;
  }).join('');
}

function toast(msg,type){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className='toast show'+(type?' '+type:'');

  tt=setTimeout(()=>el.classList.remove('show'),2800);

</script>
